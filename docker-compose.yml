services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${API_IMAGE:-kdb-rag-api:local}
    depends_on:
      neo4j:
        condition: service_healthy
      chroma:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-vertex}
      LLM_ANSWER_MODEL: ${LLM_ANSWER_MODEL:-gemini-2.5-flash}
      LLM_VERIFIER_MODEL: ${LLM_VERIFIER_MODEL:-gemini-2.5-flash}
      LLM_VERIFY_ENABLED: ${LLM_VERIFY_ENABLED:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-vertex}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-005}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VERTEX_AI_AUTH_MODE: ${VERTEX_AI_AUTH_MODE:-service_account}
      VERTEX_SERVICE_ACCOUNT_JSON_B64: ${VERTEX_SERVICE_ACCOUNT_JSON_B64:-}
      VERTEX_API_BASE_URL: ${VERTEX_API_BASE_URL:-https://us-central1-aiplatform.googleapis.com}
      VERTEX_API_VERSION: ${VERTEX_API_VERSION:-v1}
      VERTEX_GENERATE_CONTENT_PATH_TEMPLATE: ${VERTEX_GENERATE_CONTENT_PATH_TEMPLATE:-/projects/{project}/locations/{location}/publishers/google/models/{model}:generateContent}
      VERTEX_PREDICT_PATH_TEMPLATE: ${VERTEX_PREDICT_PATH_TEMPLATE:-/projects/{project}/locations/{location}/publishers/google/models/{model}:predict}
      VERTEX_MODELS_PATH_TEMPLATE: ${VERTEX_MODELS_PATH_TEMPLATE:-/projects/{project}/locations/{location}/publishers/google/models}
      VERTEX_AUTH_TOKEN_URL: ${VERTEX_AUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      VERTEX_AI_PROJECT_ID: ${VERTEX_AI_PROJECT_ID:-}
      VERTEX_AI_LOCATION: ${VERTEX_AI_LOCATION:-us-central1}
      VERTEX_AI_LABELS_ENABLED: ${VERTEX_AI_LABELS_ENABLED:-true}
      VERTEX_AI_LABEL_SERVICE: ${VERTEX_AI_LABEL_SERVICE:-webspec-coipo}
      VERTEX_AI_LABEL_SERVICE_ACCOUNT: ${VERTEX_AI_LABEL_SERVICE_ACCOUNT:-qa-anthos}
      VERTEX_AI_LABEL_USE_CASE_ID: ${VERTEX_AI_LABEL_USE_CASE_ID:-tbd}
      VERTEX_AI_CORRELATION_ID_ENABLED: ${VERTEX_AI_CORRELATION_ID_ENABLED:-true}
      CHROMA_PATH: /app/storage/chroma
      CHROMA_MODE: ${CHROMA_MODE:-remote}
      CHROMA_HOST: ${CHROMA_HOST:-localhost}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_TOKEN: ${CHROMA_TOKEN:-}
      POSTGRES_URL: ${POSTGRES_URL:-}
      WORKSPACE_PATH: /app/storage/workspace
      RETAIN_WORKSPACE_AFTER_INGEST: ${RETAIN_WORKSPACE_AFTER_INGEST:-false}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      REDIS_URL: redis://redis:6379/0
      INGESTION_EXECUTION_MODE: ${INGESTION_EXECUTION_MODE:-thread}
      INGESTION_QUEUE_NAME: ${INGESTION_QUEUE_NAME:-ingestion}
      INGESTION_JOB_TIMEOUT_SECONDS: ${INGESTION_JOB_TIMEOUT_SECONDS:-7200}
      INGESTION_RESULT_TTL_SECONDS: ${INGESTION_RESULT_TTL_SECONDS:-86400}
      INGESTION_FAILURE_TTL_SECONDS: ${INGESTION_FAILURE_TTL_SECONDS:-604800}
      INGESTION_RETRY_MAX: ${INGESTION_RETRY_MAX:-3}
      INGESTION_RETRY_INTERVALS: ${INGESTION_RETRY_INTERVALS:-30,120,300}
      INGESTION_RETRY_TRANSIENT_ONLY: ${INGESTION_RETRY_TRANSIENT_ONLY:-true}
      GIT_SSH_KEY_CONTENT: ${GIT_SSH_KEY_CONTENT:-}
      GIT_SSH_KEY_CONTENT_B64: ${GIT_SSH_KEY_CONTENT_B64:-}
      GIT_SSH_KNOWN_HOSTS_CONTENT: ${GIT_SSH_KNOWN_HOSTS_CONTENT:-}
      GIT_SSH_KNOWN_HOSTS_CONTENT_B64: ${GIT_SSH_KNOWN_HOSTS_CONTENT_B64:-}
      GIT_SSH_STRICT_HOST_KEY_CHECKING: ${GIT_SSH_STRICT_HOST_KEY_CHECKING:-yes}
      HEALTH_CHECK_STRICT: ${HEALTH_CHECK_STRICT:-true}
      HEALTH_CHECK_OPENAI: ${HEALTH_CHECK_OPENAI:-false}
      HEALTH_CHECK_REDIS: ${HEALTH_CHECK_REDIS:-false}
      CHROMA_HNSW_SPACE: ${CHROMA_HNSW_SPACE:-cosine}
      GRAPH_HOPS: ${GRAPH_HOPS:-2}
      QUERY_MAX_SECONDS: ${QUERY_MAX_SECONDS:-55}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-60}
      UI_REQUEST_TIMEOUT_SECONDS: ${UI_REQUEST_TIMEOUT_SECONDS:-90}
      INVENTORY_PAGE_SIZE: ${INVENTORY_PAGE_SIZE:-80}
      INVENTORY_MAX_PAGE_SIZE: ${INVENTORY_MAX_PAGE_SIZE:-300}
      INVENTORY_ALIAS_LIMIT: ${INVENTORY_ALIAS_LIMIT:-8}
      INVENTORY_ENTITY_LIMIT: ${INVENTORY_ENTITY_LIMIT:-500}
      SCAN_MAX_FILE_SIZE_BYTES: ${SCAN_MAX_FILE_SIZE_BYTES:-2000000}
      SCAN_EXCLUDED_DIRS: ${SCAN_EXCLUDED_DIRS:-.git,node_modules,dist,build,venv,.venv,__pycache__,.idea,.vscode,target,out,bin,obj,.gradle,.m2,.pytest_cache,.mypy_cache}
      SCAN_EXCLUDED_EXTENSIONS: ${SCAN_EXCLUDED_EXTENSIONS:-.png,.jpg,.jpeg,.gif,.webp,.ico,.mp3,.mp4,.wav,.ogg,.pdf,.zip,.tar,.gz,.7z,.rar,.jar,.war,.ear,.class,.dll,.exe,.so,.dylib,.o,.a,.bin,.sqlite,.db}
      SCAN_EXCLUDED_FILES: ${SCAN_EXCLUDED_FILES:-.gitignore,.env}
      SYMBOL_EXTRACTOR_V2_ENABLED: ${SYMBOL_EXTRACTOR_V2_ENABLED:-true}
      SEMANTIC_GRAPH_ENABLED: ${SEMANTIC_GRAPH_ENABLED:-true}
      SEMANTIC_GRAPH_JAVA_ENABLED: ${SEMANTIC_GRAPH_JAVA_ENABLED:-true}
      SEMANTIC_GRAPH_TYPESCRIPT_ENABLED: ${SEMANTIC_GRAPH_TYPESCRIPT_ENABLED:-true}
      SEMANTIC_GRAPH_QUERY_ENABLED: ${SEMANTIC_GRAPH_QUERY_ENABLED:-true}
      SEMANTIC_RELATION_TYPES: ${SEMANTIC_RELATION_TYPES:-CALLS,IMPORTS,EXTENDS,IMPLEMENTS}
      SEMANTIC_RELATION_WEIGHTS: ${SEMANTIC_RELATION_WEIGHTS:-CALLS:1.0,IMPORTS:0.7,EXTENDS:1.1,IMPLEMENTS:1.0}
      SEMANTIC_GRAPH_QUERY_MAX_EDGES: ${SEMANTIC_GRAPH_QUERY_MAX_EDGES:-400}
      SEMANTIC_GRAPH_QUERY_MAX_NODES: ${SEMANTIC_GRAPH_QUERY_MAX_NODES:-200}
      SEMANTIC_GRAPH_QUERY_MAX_MS: ${SEMANTIC_GRAPH_QUERY_MAX_MS:-120}
      SEMANTIC_GRAPH_QUERY_FALLBACK_TO_STRUCTURAL: ${SEMANTIC_GRAPH_QUERY_FALLBACK_TO_STRUCTURAL:-true}
      MODEL_DISCOVERY_TIMEOUT_SECONDS: ${MODEL_DISCOVERY_TIMEOUT_SECONDS:-8}
      MODEL_DISCOVERY_CACHE_TTL_SECONDS: ${MODEL_DISCOVERY_CACHE_TTL_SECONDS:-3600}
      MODEL_DISCOVERY_MAX_RESULTS: ${MODEL_DISCOVERY_MAX_RESULTS:-80}
      MODEL_DISCOVERY_GEMINI_SDK_ENABLED: ${MODEL_DISCOVERY_GEMINI_SDK_ENABLED:-true}
    volumes:
      - api_storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  neo4j:
    image: neo4j:5.24
    ports:
      - "17474:7474"
      - "17687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password} 'RETURN 1;' >/dev/null 2>&1"]
      interval: 20s
      timeout: 8s
      retries: 12
      start_period: 25s
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    profiles: ["redis"]
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    profiles: ["remote"]
    ports:
      - "8001:8000"
    environment:
      IS_PERSISTENT: "TRUE"
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD-SHELL", "grep -aq 'chroma' /proc/1/cmdline"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16
    profiles: ["remote"]
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-coderag}
      POSTGRES_USER: ${POSTGRES_USER:-coderag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-coderag}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-coderag} -d ${POSTGRES_DB:-coderag}"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${API_IMAGE:-kdb-rag-api:local}
    profiles: ["redis"]
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      chroma:
        condition: service_healthy
        required: false
      postgres:
        condition: service_healthy
        required: false
    command:
      - python
      - -m
      - coderag.jobs.rq_worker
      - --queue
      - ${INGESTION_QUEUE_NAME:-ingestion}
    environment:
      PYTHONPATH: /app/src
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-vertex}
      LLM_ANSWER_MODEL: ${LLM_ANSWER_MODEL:-gemini-2.5-flash}
      LLM_VERIFIER_MODEL: ${LLM_VERIFIER_MODEL:-gemini-2.5-flash}
      LLM_VERIFY_ENABLED: ${LLM_VERIFY_ENABLED:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-vertex}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-005}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      VERTEX_AI_AUTH_MODE: ${VERTEX_AI_AUTH_MODE:-service_account}
      VERTEX_SERVICE_ACCOUNT_JSON_B64: ${VERTEX_SERVICE_ACCOUNT_JSON_B64:-}
      VERTEX_API_BASE_URL: ${VERTEX_API_BASE_URL:-https://us-central1-aiplatform.googleapis.com}
      VERTEX_API_VERSION: ${VERTEX_API_VERSION:-v1}
      VERTEX_GENERATE_CONTENT_PATH_TEMPLATE: ${VERTEX_GENERATE_CONTENT_PATH_TEMPLATE:-/projects/{project}/locations/{location}/publishers/google/models/{model}:generateContent}
      VERTEX_PREDICT_PATH_TEMPLATE: ${VERTEX_PREDICT_PATH_TEMPLATE:-/projects/{project}/locations/{location}/publishers/google/models/{model}:predict}
      VERTEX_MODELS_PATH_TEMPLATE: ${VERTEX_MODELS_PATH_TEMPLATE:-/projects/{project}/locations/{location}/publishers/google/models}
      VERTEX_AUTH_TOKEN_URL: ${VERTEX_AUTH_TOKEN_URL:-https://oauth2.googleapis.com/token}
      VERTEX_AI_PROJECT_ID: ${VERTEX_AI_PROJECT_ID:-}
      VERTEX_AI_LOCATION: ${VERTEX_AI_LOCATION:-us-central1}
      VERTEX_AI_LABELS_ENABLED: ${VERTEX_AI_LABELS_ENABLED:-true}
      VERTEX_AI_LABEL_SERVICE: ${VERTEX_AI_LABEL_SERVICE:-webspec-coipo}
      VERTEX_AI_LABEL_SERVICE_ACCOUNT: ${VERTEX_AI_LABEL_SERVICE_ACCOUNT:-qa-anthos}
      VERTEX_AI_LABEL_USE_CASE_ID: ${VERTEX_AI_LABEL_USE_CASE_ID:-tbd}
      VERTEX_AI_CORRELATION_ID_ENABLED: ${VERTEX_AI_CORRELATION_ID_ENABLED:-true}
      CHROMA_PATH: /app/storage/chroma
      CHROMA_MODE: ${CHROMA_MODE:-remote}
      CHROMA_HOST: ${CHROMA_HOST:-localhost}
      CHROMA_PORT: ${CHROMA_PORT:-8000}
      CHROMA_TOKEN: ${CHROMA_TOKEN:-}
      POSTGRES_URL: ${POSTGRES_URL:-}
      WORKSPACE_PATH: /app/storage/workspace
      RETAIN_WORKSPACE_AFTER_INGEST: ${RETAIN_WORKSPACE_AFTER_INGEST:-false}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      REDIS_URL: redis://redis:6379/0
      INGESTION_EXECUTION_MODE: rq
      INGESTION_QUEUE_NAME: ${INGESTION_QUEUE_NAME:-ingestion}
      INGESTION_JOB_TIMEOUT_SECONDS: ${INGESTION_JOB_TIMEOUT_SECONDS:-7200}
      INGESTION_RESULT_TTL_SECONDS: ${INGESTION_RESULT_TTL_SECONDS:-86400}
      INGESTION_FAILURE_TTL_SECONDS: ${INGESTION_FAILURE_TTL_SECONDS:-604800}
      INGESTION_RETRY_MAX: ${INGESTION_RETRY_MAX:-3}
      INGESTION_RETRY_INTERVALS: ${INGESTION_RETRY_INTERVALS:-30,120,300}
      INGESTION_RETRY_TRANSIENT_ONLY: ${INGESTION_RETRY_TRANSIENT_ONLY:-true}
      GIT_SSH_KEY_CONTENT: ${GIT_SSH_KEY_CONTENT:-}
      GIT_SSH_KEY_CONTENT_B64: ${GIT_SSH_KEY_CONTENT_B64:-}
      GIT_SSH_KNOWN_HOSTS_CONTENT: ${GIT_SSH_KNOWN_HOSTS_CONTENT:-}
      GIT_SSH_KNOWN_HOSTS_CONTENT_B64: ${GIT_SSH_KNOWN_HOSTS_CONTENT_B64:-}
      GIT_SSH_STRICT_HOST_KEY_CHECKING: ${GIT_SSH_STRICT_HOST_KEY_CHECKING:-yes}
      CHROMA_HNSW_SPACE: ${CHROMA_HNSW_SPACE:-cosine}
      SCAN_MAX_FILE_SIZE_BYTES: ${SCAN_MAX_FILE_SIZE_BYTES:-2000000}
      SCAN_EXCLUDED_DIRS: ${SCAN_EXCLUDED_DIRS:-.git,node_modules,dist,build,venv,.venv,__pycache__,.idea,.vscode,target,out,bin,obj,.gradle,.m2,.pytest_cache,.mypy_cache}
      SCAN_EXCLUDED_EXTENSIONS: ${SCAN_EXCLUDED_EXTENSIONS:-.png,.jpg,.jpeg,.gif,.webp,.ico,.mp3,.mp4,.wav,.ogg,.pdf,.zip,.tar,.gz,.7z,.rar,.jar,.war,.ear,.class,.dll,.exe,.so,.dylib,.o,.a,.bin,.sqlite,.db}
      SCAN_EXCLUDED_FILES: ${SCAN_EXCLUDED_FILES:-.gitignore,.env}
      SYMBOL_EXTRACTOR_V2_ENABLED: ${SYMBOL_EXTRACTOR_V2_ENABLED:-true}
      SEMANTIC_GRAPH_ENABLED: ${SEMANTIC_GRAPH_ENABLED:-true}
      SEMANTIC_GRAPH_JAVA_ENABLED: ${SEMANTIC_GRAPH_JAVA_ENABLED:-true}
      SEMANTIC_GRAPH_TYPESCRIPT_ENABLED: ${SEMANTIC_GRAPH_TYPESCRIPT_ENABLED:-true}
    volumes:
      - api_storage:/app/storage
    restart: unless-stopped

volumes:
  api_storage:
  neo4j_data:
  redis_data:
  chroma_data:
  postgres_data:
