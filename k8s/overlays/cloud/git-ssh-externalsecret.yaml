apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: coderag-git-ssh-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: coderag-cluster-secret-store
  target:
    name: coderag-git-ssh-secret
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: GIT_SSH_KEY_CONTENT
      remoteRef:
        key: coderag/git-ssh
        property: id_rsa
    - secretKey: GIT_SSH_KNOWN_HOSTS_CONTENT
      remoteRef:
        key: coderag/git-ssh
        property: known_hosts
