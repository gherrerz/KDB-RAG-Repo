apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: coderag-api
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  tls:
    - hosts:
        - coderag-api.example.com
      secretName: coderag-api-tls
  rules:
    - host: coderag-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: coderag-api
                port:
                  number: 8000
