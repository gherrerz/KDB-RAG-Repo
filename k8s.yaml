replicaCount: 1
# Las migraciones Alembic corren en el arranque de la API (lifespan). Para evitar que
# durante un rollout coexistan el pod viejo (migrando) y el nuevo y se bloqueen entre sí,
# el deployment debe usar estrategia Recreate (o maxSurge: 0). Verificar que el chart
# interno exponga `strategy`; si lo hace, descomentar y ajustar:
# strategy:
#   type: Recreate
epm: BKKG
service:
  port: 8000

appContext: /


#depdendencyCheck:
#  - passsport
#  - db_appeal

resources:
  limits:
    cpu: 4000m
    memory: 8192Mi
  requests:
    cpu: 500m
    memory: 1024Mi

secrets:
#  - name: OPENAI_API_KEY
#  - name: GEMINI_API_KEY
  - name: VERTEX_SERVICE_ACCOUNT_JSON_B64
  - name: NEO4J_USER
  - name: NEO4J_PASSWORD
  - name: GIT_SSH_KEY_CONTENT
  - name: GIT_SSH_KNOWN_HOSTS_CONTENT
  - name: GIT_SSH_STRICT_HOST_KEY_CHECKING
  - name: CHROMA_USERNAME
  - name: CHROMA_PASSWORD
  - name: POSTGRES_USER
  - name: POSTGRES_PASSWORD
  - name: WEBHOOK_BITBUCKET_SECRET
  - name: WEBHOOK_BITBUCKET_AUTH_USERNAME
  - name: WEBHOOK_BITBUCKET_AUTH_SECRET


vault:
  enabled: false

trafficControl:
  enabled: false
  egress:
    services:
      - copilot.external.svc
      - copilotapi.external.svc
      - jira-cl.external.svc.cluster.local
      - jenkins-dev.external.svc
      - bitbucket-cl.external.svc
      - bitbucket-cl.external.svc.cluster.local
      - oauth2-googleapis-api.external.svc
      - us-central1-aiplatform-googleapis.external.svc
      - aiplatform-googleapis.external.svc
      - oauth2-googleapis-api.external.svc.cluster.local
      - us-central1-aiplatform-googleapis.external.svc.cluster.local
      - aiplatform-googleapis.external.svc.cluster.local

ingress:
  enabled: true
  annotations:
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "1200"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1200"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1200"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "50m"
    nginx.org/client-max-body-size: "50m"
  internet_facing:
    enabled: false
  pathPrefix: /
  cors:
    envsAllowedOrigins:
      prd: "*"
      uat: "*"
      ist: "*"
      dev: "*"

extraEnv:
  API_IMAGE: "kdb-rag-api:local"
  #VERTEX_API_BASE_URL: "https://aiplatform.googleapis.com"
  VERTEX_API_BASE_URL: "https://us-central1-aiplatform.googleapis.com"
  VERTEX_AUTH_TOKEN_URL: "https://oauth2.googleapis.com/token"
  VERTEX_AI_PROJECT_ID: "cidat-21008-stg-cacc"
  VERTEX_AI_LOCATION: "us-central1"
  CHROMA_PATH: "/app/storage/chroma"
  CHROMA_MODE: "remote"
  CHROMA_HOST: "chromadb-operator.chromadb-operator.svc"
  CHROMA_PORT: "8000"
  POSTGRES_HOST: "coipo-postgres.coipo.svc"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "coipo_db"
  #NEO4J_URI: "neo4j://10.34.136.31:7687"
  NEO4J_URI: "neo4j://neo4j-operator.neo4j-operator.svc:7687"
  REDIS_URL: "redis://localhost:6379/0"
  WORKSPACE_PATH: "/app/storage/workspace"
  WEBHOOK_BITBUCKET_INTERNAL_BASE_URL: "https://bitbucket-cl.external.svc"
  WEBHOOK_BITBUCKET_TARGET_BRANCHES: "main,master"
  WEBHOOK_BITBUCKET_REPO_REGISTRY: "{}"
  WEBHOOK_BITBUCKET_REPO_REGISTRY_FILE: "/app/config/webhook_registry.json"
